apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-service
  template:
    metadata:
      labels:
        app: hospital-service
    spec:
      containers:
      - name: hospital-service
        image: bloodbridge-hospital:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-service
spec:
  selector:
    app: hospital-service
  ports:
    - port: 3003
      targetPort: 3003
      nodePort: 30003
  type: NodePort
